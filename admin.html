<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Centre | Admin</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --danger: #ef4444;
            --success: #10b981;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f1f5f9;
            color: var(--text-main);
            padding: 40px;
            min-height: 100vh;
            display: none; /* 🔒 Locked by default */
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 800;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #f8fafc;
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid #e2e8f0;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
        }

        tr:hover {
            background: #f8fafc;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-admin { background: rgba(79, 70, 229, 0.1); color: var(--primary); }
        .badge-user { background: #f1f5f9; color: var(--text-muted); }
        .badge-yes { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-no { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        .btn-action {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: all 0.2s;
            color: var(--text-muted);
        }

        .btn-action:hover {
            background: #f1f5f9;
            color: var(--primary);
        }

        .btn-delete:hover {
            color: var(--danger);
            background: #fee2e2;
        }

        /* Edit Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .edit-box {
            background: white;
            padding: 32px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .edit-box h3 { margin-bottom: 24px; font-family: 'Outfit'; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); font-size: 13px; }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
            background: #f8fafc;
        }

        .btn-save {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            border: none;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-cancel {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: #f1f5f9;
            color: var(--text-main);
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <a href="dashboard.html" class="back-btn"><i data-lucide="arrow-left" style="width: 16px;"></i> Dashboard</a>
            <h2 style="margin-top: 10px;">User Management</h2>
        </div>
        <button onclick="loadUsers()" style="background: white; border: 1px solid #e2e8f0; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px;">
            <i data-lucide="rotate-cw" style="width: 18px;"></i> Refresh
        </button>
    </div>

    <div class="card" style="overflow-x: auto;">
        <table id="userTable">
            <thead>
                <tr>
                    <th>User</th>
                    <th>Status</th>
                    <th>Role</th>
                    <th>Joined At</th>
                    <th style="text-align: right;">Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Users will be injected here -->
            </tbody>
        </table>
    </div>

    <!-- Edit Modal -->
    <div class="overlay" id="editOverlay">
        <div class="edit-box">
            <h3>Update User</h3>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>System Role</label>
                <select id="editRole">
                    <option value="user">Standard User</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
            <div class="form-group">
                <label>Verification Status</label>
                <select id="editVerified">
                    <option value="true">Verified</option>
                    <option value="false">Unverified</option>
                </select>
            </div>
            <button class="btn-save" onclick="updateUser()">Save Changes</button>
            <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
        </div>
    </div>

    <script>
        const BASE_URL = "https://accountcentre.onrender.com";
        const token = localStorage.getItem("token");

        lucide.createIcons();

        if (!token) {
            window.location.href = "login.html";
        }

        function parseJwt(t) { 
            try { return JSON.parse(atob(t.split('.')[1])); } 
            catch { return null; } 
        }

        const decoded = parseJwt(token);
        
        // 🛡️ Double-lock Frontend Authorization
        if (!decoded || decoded.role !== "admin") {
            window.location.href = "dashboard.html"; // Kick them out instantly
        } else {
            // ✅ Only show if confirmed admin
            document.body.style.display = "block";
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${BASE_URL}/users`, { headers: { Authorization: "Bearer " + token } });
                if (!res.ok) return deny();
                const users = await res.json();
                const tbody = document.querySelector("#userTable tbody");
                tbody.innerHTML = "";

                users.forEach(u => {
                    const statusBadge = u.is_verified ? '<span class="badge badge-yes">Verified</span>' : '<span class="badge badge-no">Unverified</span>';
                    const roleBadge = u.role === 'admin' ? '<span class="badge badge-admin">Admin</span>' : '<span class="badge badge-user">User</span>';
                    tbody.innerHTML += `
                        <tr>
                            <td>
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <div style="width: 32px; height: 32px; border-radius: 50%; background: #f1f5f9; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #e2e8f0; flex-shrink: 0;">
                                        ${u.avatar_url ? `<img src="${u.avatar_url}" style="width:100%; height:100%; object-fit:cover;">` : `<span style="font-size:12px; font-weight:800; color:var(--primary);">${(u.name || u.email)[0].toUpperCase()}</span>`}
                                    </div>
                                    <div>
                                        <div style="font-weight: 700;">${u.name || 'No Name'}</div>
                                        <div style="font-size: 11px; color: var(--text-muted);">${u.email}</div>
                                    </div>
                                </div>
                            </td>
                            <td>${statusBadge}</td>
                            <td>${roleBadge}</td>
                            <td style="color: var(--text-muted); font-size: 12px;">${new Date(u.created_at).toLocaleDateString()}</td>
                            <td style="text-align: right;">
                                <button class="btn-action" onclick="editUser(${u.id}, '${u.role}', ${u.is_verified})"><i data-lucide="edit-2" style="width: 18px;"></i></button>
                                <button class="btn-action btn-delete" onclick="deleteUser(${u.id})"><i data-lucide="trash-2" style="width: 18px;"></i></button>
                            </td>
                        </tr>
                    `;
                });
                lucide.createIcons();
            } catch (err) { alert("Failed to load users."); }
        }

        function editUser(id, role, v) {
            document.getElementById("editOverlay").style.display = "flex";
            document.getElementById("editId").value = id;
            document.getElementById("editRole").value = role;
            document.getElementById("editVerified").value = v.toString();
        }

        function closeEdit() { document.getElementById("editOverlay").style.display = "none"; }

        async function updateUser() {
            const id = document.getElementById("editId").value;
            const res = await fetch(`${BASE_URL}/user/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
                body: JSON.stringify({ role: document.getElementById("editRole").value, is_verified: document.getElementById("editVerified").value === "true" })
            });
            if (res.ok) { closeEdit(); loadUsers(); } else { alert("Update failed."); }
        }

        async function deleteUser(id) {
            if (!confirm("Are you sure you want to delete this user forever?")) return;
            const res = await fetch(`${BASE_URL}/user/${id}`, { method: "DELETE", headers: { Authorization: "Bearer " + token } });
            if (res.ok) loadUsers();
        }

        function deny() { document.body.innerHTML = "<h2 style='text-align:center; margin-top:100px;'>403 | Access Denied</h2>"; }
        loadUsers();
    </script>
</body>
</html>
