<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eaeaea;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 900px;
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      padding: 50px 40px;
      box-sizing: border-box;
    }

    h2 {
      font-size: 42px;
      text-align: center;
      margin-bottom: 25px;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .google-btn {
      width: 100%;
      max-width: 520px;
      padding: 20px;
      font-size: 20px;
      border-radius: 12px;
      border: 1px solid #ccc;
      background: white;
      cursor: not-allowed;
      margin-bottom: 25px;
    }

    .divider {
      font-size: 18px;
      margin: 15px 0;
      color: #888;
    }
    /* From Uiverse.io by adamgiebl */ 
button {
  font-family: inherit;
  font-size: 20px;
  background: royalblue;
  color: white;
  padding: 0.7em 1em;
  padding-left: 0.9em;
  display: flex;
  align-items: center;
  border: none;
  border-radius: 16px;
  overflow: hidden;
  transition: all 0.2s;
  cursor: pointer;
}

button span {
  display: block;
  margin-left: 0.3em;
  transition: all 0.3s ease-in-out;
}

button svg {
  display: block;
  transform-origin: center center;
  transition: transform 0.3s ease-in-out;
}

button:hover .svg-wrapper {
  animation: fly-1 0.6s ease-in-out infinite alternate;
}

button:hover svg {
  transform: translateX(1.2em) rotate(45deg) scale(1.1);
}

button:hover span {
  transform: translateX(5em);
}

button:active {
  transform: scale(0.95);
}

@keyframes fly-1 {
  from {
    transform: translateY(0.1em);
  }

  to {
    transform: translateY(-0.1em);
  }
}


    form {
      width: 100%;
      max-width: 520px;
    }

    input {
      width: 100%;
      padding: 18px;
      margin: 14px 0;
      font-size: 18px;
      border-radius: 12px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-eye {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      user-select: none;
      color: #555;
    }

    button[type="submit"] {
      width: 100%;
      padding: 20px;
      font-size: 22px;
      border-radius: 14px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    .login-link {
      margin-top: 18px;
      text-align: center;
      font-size: 16px;
    }

    .login-link a {
      color: #007bff;
      text-decoration: none;
    }

    #errorMsg {
      color: red;
      margin-top: 12px;
      font-size: 15px;
      display: none;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Create Account</h2>

    <div class="content">
      <button class="google-btn" disabled>
        Continue with Google (coming soon)
      </button>

      <div class="divider">or</div>

      <form id="signupForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email" required>

        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Password" required>
          <span class="toggle-eye" id="toggleEye">👁️</span>
        </div> 
          <button type="submit" id="signupBtn">
  <div class="svg-wrapper-1">
    <div class="svg-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
        <path fill="none" d="M0 0h24v24H0z"></path>
        <path fill="currentColor"
          d="M1.946 9.315c-.522-.174-.527-.455.01-.634l19.087-6.362c.529-.176.832.12.684.638l-5.454 19.086c-.15.529-.455.547-.679.045L12 14l6-8-8 6-8.054-2.685z">
        </path>
      </svg>
    </div>
  </div>
  <span>Sign Up</span>
</button>
</div>

        <p id="errorMsg"></p>

        <div class="login-link">
          Already have an account?
          <a href="login.html">Login</a>
        </div>
      </form>
    </div>
  </div>

<script>
const BASE_URL = "https://accountcentre.onrender.com";

const form = document.getElementById("signupForm");
const errorMsg = document.getElementById("errorMsg");
const passwordInput = document.getElementById("password");
const toggleEye = document.getElementById("toggleEye");

/* 👁 Toggle password */
toggleEye.addEventListener("click", () => {
  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    toggleEye.textContent = "🙈";
  } else {
    passwordInput.type = "password";
    toggleEye.textContent = "👁️";
  }
});

/* 🔥 SIGNUP */
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorMsg.style.display = "none";

  const nameInputEl = document.getElementById("name");
  const emailInputEl = document.getElementById("email");
  const submitBtn = form.querySelector('button[type="submit"]');

  const name = nameInputEl.value.trim();
  const email = emailInputEl.value.trim();
  const password = passwordInput.value;

  if (password.length < 6) {
    errorMsg.textContent = "Password must be at least 6 characters.";
    errorMsg.style.display = "block";
    return;
  }

  // UX: Loading state
  const originalBtnText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = "Sending OTP...";

  try {
    const res = await fetch(`${BASE_URL}/signup`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      errorMsg.textContent = data.msg || "Signup failed";
      errorMsg.style.display = "block";
      submitBtn.disabled = false;
      submitBtn.textContent = originalBtnText;
      return;
    }

    // ✅ OTP sent: Hide original inputs to prevent confusion, show OTP section
    nameInputEl.style.display = "none";
    emailInputEl.style.display = "none";
    passwordInput.parentElement.style.display = "none"; // hides the wrapper
    submitBtn.style.display = "none";

    document.getElementById("otpSection").style.display = "block";
    
    errorMsg.style.color = "green";
    errorMsg.textContent = "OTP sent to your email. Enter it below.";
    errorMsg.style.display = "block";

  } catch (err) {
    console.error(err);
    errorMsg.textContent = "Server error... try again";
    errorMsg.style.display = "block";
    submitBtn.disabled = false;
    submitBtn.textContent = originalBtnText;
  }
});

/* 🔥 VERIFY OTP */
document.getElementById("verifyBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const otp = document.getElementById("otp").value.trim();
  const verifyBtn = document.getElementById("verifyBtn");

  if (!otp) {
    errorMsg.style.color = "red";
    errorMsg.textContent = "Enter OTP";
    errorMsg.style.display = "block";
    return;
  }

  verifyBtn.disabled = true;
  verifyBtn.textContent = "Verifying...";

  try {
    const res = await fetch(`${BASE_URL}/verify-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, otp })
    });

    const data = await res.json();

    if (!res.ok) {
      errorMsg.style.color = "red";
      errorMsg.textContent = data.msg || "OTP failed";
      errorMsg.style.display = "block";
      verifyBtn.disabled = false;
      verifyBtn.textContent = "Verify OTP";
      return;
    }

    errorMsg.style.color = "green";
    errorMsg.textContent = "Account verified! Redirecting to login...";
    errorMsg.style.display = "block";
    
    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  } catch (err) {
    console.error(err);
    errorMsg.style.color = "red";
    errorMsg.textContent = "Verification failed";
    errorMsg.style.display = "block";
    verifyBtn.disabled = false;
    verifyBtn.textContent = "Verify OTP";
  }
});
</script>

</body>
</html>
