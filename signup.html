<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Centre | Sign Up</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto;
            position: relative;
        }

        /* Abstract Background Blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(80px);
            border-radius: 50%;
            z-index: 0;
            animation: move 20s infinite alternate;
        }

        .blob-1 { top: -100px; left: -100px; }
        .blob-2 { bottom: -100px; right: -100px; background: rgba(79, 70, 229, 0.2); }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        .container {
            background: var(--bg-glass);
            width: 100%;
            max-width: 480px;
            border-radius: 28px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 40px;
            z-index: 10;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 6px;
        }

        .social-btn {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 14px;
            cursor: not-allowed;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 20px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .form-group {
            position: relative;
            margin-bottom: 16px;
        }

        .form-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
        }

        input {
            width: 100%;
            padding: 12px 16px 12px 48px;
            font-size: 14px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: rgba(248, 250, 252, 0.8);
            transition: all 0.2s;
            color: var(--text-main);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .toggle-eye {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
        }

        #signupBtn, #verifyBtn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #signupBtn:hover, #verifyBtn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        #verifyBtn {
            background: var(--success);
        }

        .footer-links {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        #errorMsg {
            padding: 10px;
            border-radius: 10px;
            margin-top: 16px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            text-align: center;
        }

        #loginOtp {
            text-align: center;
            letter-spacing: 8px;
            font-size: 24px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <div id="signupMainArea">
            <div class="logo-area">
                <div class="logo-icon">
                    <i data-lucide="user-plus" style="width: 28px; height: 28px;"></i>
                </div>
                <h2>Create Account</h2>
                <p class="subtitle">Join the Account Centre community</p>
            </div>

            <div class="social-btn">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.908 3.152-1.928 4.176-1.228 1.228-3.14 2.568-7.392 2.568-6.676 0-11.92-5.404-11.92-12.08s5.244-12.08 11.92-12.08c3.612 0 6.204 1.428 8.148 3.272l2.304-2.304c-2.608-2.496-6.104-4.44-11.58-4.44-9.504 0-17.652 7.716-17.652 17.552s8.148 17.552 17.376 17.552c5.292 0 9.292-1.752 12.396-4.992 3.192-3.192 4.188-7.656 4.188-11.196 0-1.056-.096-2.076-.288-3.012h-12.48z" fill="#4285F4"/></svg>
                Continue with Google
            </div>

            <div class="divider">or use email</div>

            <form id="signupForm">
                <div class="form-group">
                    <i data-lucide="user"></i>
                    <input type="text" id="name" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <i data-lucide="mail"></i>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <i data-lucide="lock"></i>
                    <div style="position: relative;">
                        <input type="password" id="password" placeholder="Password" required>
                        <div class="toggle-eye" id="toggleEye">
                            <i data-lucide="eye" style="width: 18px;"></i>
                        </div>
                    </div>
                </div>

                <button type="submit" id="signupBtn">
                    <span>Sign Up</span>
                    <i data-lucide="chevron-right" style="width: 18px;"></i>
                </button>
            </form>
        </div>

        <div id="otpSection" style="display: none; text-align: center;">
            <div class="logo-area">
                <div class="logo-icon" style="background: var(--success);">
                    <i data-lucide="mail-check" style="width: 28px; height: 28px;"></i>
                </div>
                <h2>Verify Email</h2>
                <p class="subtitle">We've sent a code to your inbox</p>
            </div>
            <div class="form-group">
                <input type="text" id="otp" placeholder="000000" maxlength="6">
            </div>
            <button type="button" id="verifyBtn">
                Verify Account
            </button>
        </div>

        <div id="errorMsg"></div>

        <div class="footer-links">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        const BASE_URL = "https://accountcentre.onrender.com";
        const form = document.getElementById("signupForm");
        const errorMsg = document.getElementById("errorMsg");
        const passwordInput = document.getElementById("password");
        const toggleEye = document.getElementById("toggleEye");

        lucide.createIcons();

        /* 👁 Toggle password */
        toggleEye.addEventListener("click", () => {
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                toggleEye.innerHTML = '<i data-lucide="eye-off" style="width: 18px;"></i>';
            } else {
                passwordInput.type = "password";
                toggleEye.innerHTML = '<i data-lucide="eye" style="width: 18px;"></i>';
            }
            lucide.createIcons();
        });

        function showError(msg, color) {
            errorMsg.style.background = color === "var(--danger)" ? "rgba(239, 68, 68, 0.1)" : "rgba(16, 185, 129, 0.1)";
            errorMsg.style.color = color;
            errorMsg.style.border = `1px solid ${color}`;
            errorMsg.textContent = msg;
            errorMsg.style.display = "block";
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorMsg.style.display = "none";

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = passwordInput.value;
            const submitBtn = document.getElementById("signupBtn");

            if (password.length < 6) return showError("Password must be at least 6 characters.", "var(--danger)");

            const originalBtnContent = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = "Sending OTP...";

            try {
                const res = await fetch(`${BASE_URL}/signup`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.msg || "Signup failed", "var(--danger)");
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalBtnContent;
                    return;
                }

                document.getElementById("signupMainArea").style.display = "none";
                document.getElementById("otpSection").style.display = "block";
                showError("Verification code sent!", "var(--success)");

            } catch (err) {
                showError("Server error. Please try again.", "var(--danger)");
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnContent;
            }
        });

        document.getElementById("verifyBtn").addEventListener("click", async () => {
            const email = document.getElementById("email").value.trim();
            const otp = document.getElementById("otp").value.trim();
            const verifyBtn = document.getElementById("verifyBtn");

            if (!otp) return showError("Please enter the code", "var(--danger)");

            verifyBtn.disabled = true;
            verifyBtn.innerHTML = "Verifying...";

            try {
                const res = await fetch(`${BASE_URL}/verify-otp`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, otp })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.msg || "Invalid code", "var(--danger)");
                    verifyBtn.disabled = false;
                    verifyBtn.textContent = "Verify Account";
                    return;
                }

                showError("Verified! Moving to login...", "var(--success)");
                setTimeout(() => { window.location.href = "login.html"; }, 1500);

            } catch (err) {
                showError("Verification failed.", "var(--danger)");
                verifyBtn.disabled = false;
                verifyBtn.textContent = "Verify Account";
            }
        });
    </script>
</body>
</html>
