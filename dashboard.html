<!DOCTYPE html>  <html lang="en">  
<head>  
  <meta charset="UTF-8">  
  <title>User Dashboard</title>    <style>  
    body {  
      margin: 0;  
      font-family: Arial, sans-serif;  
      background: #f2f2f2;  
      min-height: 100vh;  
      display: flex;  
      justify-content: center;  
      align-items: center;  
      padding: 20px;  
      box-sizing: border-box;  
    }  
  
    .dashboard {  
      background: white;  
      width: 100%;  
      max-width: 900px;  
      border-radius: 20px;  
      box-shadow: 0 25px 60px rgba(0,0,0,0.2);  
      padding: 40px;  
      box-sizing: border-box;  
    }  
  
    .header {  
      display: flex;  
      justify-content: space-between;  
      align-items: center;  
      margin-bottom: 30px;  
    }  
  
    .header h1 {  
      font-size: 36px;  
      margin: 0;  
    }  
  
    .logout-btn {  
      padding: 12px 20px;  
      font-size: 16px;  
      border-radius: 8px;  
      border: none;  
      background: #dc3545;  
      color: white;  
      cursor: pointer;  
    }  
  
    .logout-btn:hover {  
      background: #b52a37;  
    }  
  
    .content {  
      display: grid;  
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));  
      gap: 20px;  
    }  
  
    .card {  
      background: #f9f9f9;  
      border-radius: 14px;  
      padding: 25px;  
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);  
    }  
  
    .card h3 {  
      margin-top: 0;  
      font-size: 22px;  
    }  
  
    .card p {  
      color: #555;  
      font-size: 16px;  
    } 
    @media (max-width: 600px) {

  .dashboard {
    padding: 20px;
  }

  .header {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .header h1 {
    font-size: 24px;
  }

  .logout-btn {
    width: 100%;
  }

  .content {
    display: flex;        /* 🔥 force vertical */
    flex-direction: column;
  }

  .card {
    width: 100%;
  }
} 
/* From Uiverse.io by vinodjangid07 */ 
.Btn {
  display: flex;
  align-items: center;
  justify-content: flex-start; /* ✅ center when collapsed */
  white-space: nowrap;
  width: 45px;
  height: 45px;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: .3s;
  box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.199);
  background-color: rgb(255, 65, 65);
}

/* plus sign */
.sign {
  width: 45px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.sign svg {
  width: 17px;
  transform: translateX(-5px);
}

.sign svg path {
  fill: white;
}
/* text */
.text {
  position: absolute;
  right: 0;
  width: 70%;
  opacity: 0;
  overflow: hidden;
  white-space: nowrap;
  color: white;
  font-size: 1.2em;
  font-weight: 600;
  padding-left: 10px; /* ✅ ADD THIS */
  box-sizing: border-box; /* prevents overflow issues */
  transition-duration: .3s;
}
/* hover effect on button width */
.Btn:hover {
  width: 125px;
  border-radius: 40px;
  transition-duration: .3s;
}

.Btn:hover .sign {
  width: 30%;
  transition-duration: .3s;
  padding-left: 20px;
}
/* hover effect button's text */
.Btn:hover .text {
  opacity: 1;
  width: 70%;
  transition-duration: .3s;
  padding-right: 10px;
}
/* button click effect*/
.Btn:active {
  transform: translate(2px ,2px);
}
  </style>  </head>  <body>    <div class="dashboard">  
    <div class="header">  
      <h1 id="welcomeText">Welcome 👋</h1>  
      <button class="Btn" id="logoutBtn">
  <div class="sign">
    <svg viewBox="0 0 512 512">
      <path d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"></path>
    </svg>
  </div>
  <div class="text">Logout</div>
</button>  
    </div>  <div class="content">  
  <div class="card">  
    <h3>Your Profile</h3>  
    <p><strong>Name:</strong> <span id="userName">—</span></p>  
    <p><strong>Email:</strong> <span id="userEmail">—</span></p>  
  </div>  

  <div class="card">  
    <h3>Activity</h3>  
    <p>You are logged in successfully.</p>  
  </div>  

  <div class="card">  
    <h3>Settings</h3>  
    <p>Account settings coming soon.</p>  
  </div>  
</div>

  </div>    <script>
const BASE_URL = "https://accountcentre.onrender.com";

const token = localStorage.getItem("token");

// ❌ No token → redirect
if (!token) {
  window.location.href = "login.html";
}

// ✅ Get current user
async function loadUser() {
  try {
    const res = await fetch(`${BASE_URL}/me`, {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if (!res.ok) {
      localStorage.removeItem("token");
      window.location.href = "login.html";
      return;
    }

    const user = await res.json();

    document.getElementById("userName").innerText =
      user.name || "No Name";

    document.getElementById("userEmail").innerText =
      user.email;

    document.getElementById("welcomeText").innerText =
      `Welcome, ${user.name || user.email} 👋`;

  } catch (err) {
    console.error("Dashboard error:", err);

    // 🔥 handles Render cold start + network errors
    setTimeout(loadUser, 2000);
  }
}

loadUser();

// 🚪 logout
document.getElementById("logoutBtn").addEventListener("click", () => {
  localStorage.removeItem("token");
  window.location.href = "login.html";
});
</script>  

</body>  
</html>
