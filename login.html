<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eaeaea;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 900px;
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      padding: 50px 40px;
      box-sizing: border-box;
    }

    h2 {
      font-size: 42px;
      text-align: center;
      margin-bottom: 25px;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    form {
      width: 100%;
      max-width: 520px;
    }

    input {
      width: 100%;
      padding: 18px;
      margin: 14px 0;
      font-size: 18px;
      border-radius: 12px;
      border: 1px solid #ccc;
    }

    button[type="submit"] {
      width: 100%;
      padding: 20px;
      font-size: 22px;
      border-radius: 14px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    .signup-link, .forgot-link {
      margin-top: 18px;
      text-align: center;
      font-size: 16px;
    }

    #errorMsg {
      color: red;
      margin-top: 12px;
      font-size: 15px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Welcome Back</h2>

    <div class="content">

      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Login</button>

        <div class="forgot-link">
          <a href="forgot.html">Forgot password</a>
        </div>

        <p id="errorMsg"></p>

        <div class="signup-link">
          Don’t have an account?
          <a href="signup.html">Sign Up</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const BASE_URL = "https://accountcentre.onrender.com";

    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.style.display = "none";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const res = await fetch(`${BASE_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        let data;
        try {
          data = await res.json();
        } catch {
          throw new Error("Invalid JSON response");
        }

        if (!res.ok) {
          if (data.msg === "Verify email first") {
            errorMsg.textContent = "Verify your email first (OTP)";
          } else if (data.msg) {
            errorMsg.textContent = data.msg;
          } else {
            errorMsg.textContent = "Login failed";
          }
          errorMsg.style.display = "block";
          return;
        }

        // store token
        localStorage.setItem("token", data.token);

        // redirect
        window.location.href = "dashboard.html";

      } catch (err) {
        console.error(err);
        errorMsg.textContent = "Server error or slow startup (try again)";
        errorMsg.style.display = "block";
      }
    });
  </script>

</body>
</html>
