<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eaeaea;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 900px;
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      padding: 50px 40px;
      box-sizing: border-box;
    }

    h2 {
      font-size: 42px;
      text-align: center;
      margin-bottom: 25px;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    form {
      width: 100%;
      max-width: 520px;
    }

    input {
      width: 100%;
      padding: 18px;
      margin: 14px 0;
      font-size: 18px;
      border-radius: 12px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-eye {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      user-select: none;
      color: #555;
    }

    button[type="submit"] {
      width: 100%;
      padding: 20px;
      font-size: 22px;
      border-radius: 14px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    .signup-link, .forgot-link {
      margin-top: 18px;
      text-align: center;
      font-size: 16px;
    }

    #errorMsg {
      color: red;
      margin-top: 12px;
      font-size: 15px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Welcome Back</h2>

    <div class="content">

      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Password" required>
          <span class="toggle-eye" id="toggleEye">👁️</span>
        </div>

        <button type="submit">Login</button>

        <div class="forgot-link">
          <a href="forgot.html">Forgot password</a>
        </div>

        <p id="errorMsg"></p>

        <div class="signup-link">
          Don’t have an account?
          <a href="signup.html">Sign Up</a>
        </div>
      </form>

      <div id="otpSection" style="display:none; width: 100%; max-width: 520px; text-align: center;">
        <p style="font-size: 18px; margin-bottom: 15px;">Your account is unverified.</p>
        <input type="text" id="loginOtp" placeholder="Enter OTP" style="text-align: center; letter-spacing: 4px; font-size: 24px;">
        <button type="button" id="verifyOtpBtn">Verify Account</button>
        <div style="margin-top: 15px;">
          <a href="#" id="resendOtpBtn" style="color: #007bff; text-decoration: none; font-size: 16px;">Resend OTP Email</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    const BASE_URL = "https://accountcentre.onrender.com";

    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");
    const passwordInput = document.getElementById("password");
    const toggleEye = document.getElementById("toggleEye");

    /* 👁 Toggle password */
    toggleEye.addEventListener("click", () => {
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleEye.textContent = "🙈";
      } else {
        passwordInput.type = "password";
        toggleEye.textContent = "👁️";
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.style.display = "none";

      const email = document.getElementById("email").value.trim();
      const password = passwordInput.value;
      const submitBtn = form.querySelector('button[type="submit"]');

      const originalBtnText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = "Logging in...";

      try {
        const res = await fetch(`${BASE_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        let data;
        try {
          data = await res.json();
        } catch {
          throw new Error("Invalid JSON response");
        }

        if (!res.ok) {
          if (data.msg === "Verify email first") {
            form.style.display = "none";
            document.getElementById("otpSection").style.display = "block";
            errorMsg.style.color = "red";
            errorMsg.textContent = "Provide your OTP from the email, or request a new one below.";
            errorMsg.style.display = "block";
            return;
          }

          errorMsg.style.color = "red";
          if (data.msg) {
            errorMsg.textContent = data.msg;
          } else {
            errorMsg.textContent = "Login failed";
          }
          errorMsg.style.display = "block";
          submitBtn.disabled = false;
          submitBtn.textContent = originalBtnText;
          return;
        }

        errorMsg.style.color = "green";
        errorMsg.textContent = "Login successful! Redirecting...";
        errorMsg.style.display = "block";

        // store token
        localStorage.setItem("token", data.token);

        // redirect smoothly
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1000);

      } catch (err) {
        console.error(err);
        errorMsg.style.color = "red";
        errorMsg.textContent = "Server error or slow startup (try again)";
        errorMsg.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.textContent = originalBtnText;
      }
    });

    /* 🔥 LOGIC TO RESEND AND VERIFY OTP FROM LOGIN SCREEN */
    const verifyOtpBtn = document.getElementById("verifyOtpBtn");
    const resendOtpBtn = document.getElementById("resendOtpBtn");

    resendOtpBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      resendOtpBtn.textContent = "Sending...";
      resendOtpBtn.style.pointerEvents = "none";
      
      try {
        const res = await fetch(`${BASE_URL}/resend-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        if (res.ok) {
          errorMsg.style.color = "green";
          errorMsg.textContent = "A new OTP was sent your email!";
        } else {
          errorMsg.style.color = "red";
          errorMsg.textContent = "Failed to resend OTP.";
        }
      } catch {
        errorMsg.style.color = "red";
        errorMsg.textContent = "Server error.";
      }
      resendOtpBtn.textContent = "Resend OTP Email";
      resendOtpBtn.style.pointerEvents = "auto";
    });

    verifyOtpBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const otp = document.getElementById("loginOtp").value.trim();

      if (!otp) {
        errorMsg.style.color = "red";
        errorMsg.textContent = "Enter OTP";
        return;
      }

      verifyOtpBtn.disabled = true;
      verifyOtpBtn.textContent = "Verifying...";

      try {
        const res = await fetch(`${BASE_URL}/verify-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, otp })
        });
        const data = await res.json();

        if (!res.ok) {
          errorMsg.style.color = "red";
          errorMsg.textContent = data.msg || "OTP failed";
          verifyOtpBtn.disabled = false;
          verifyOtpBtn.textContent = "Verify Account";
          return;
        }

        errorMsg.style.color = "green";
        errorMsg.textContent = "Verified! Redirecting to login...";
        
        // Hide OTP section, bring back login
        setTimeout(() => {
          document.getElementById("otpSection").style.display = "none";
          form.style.display = "block";
          document.getElementById("password").value = "";
          form.querySelector('button[type="submit"]').disabled = false;
          form.querySelector('button[type="submit"]').textContent = "Login";
          errorMsg.style.display = "none";
        }, 1500);

      } catch (err) {
        errorMsg.style.color = "red";
        errorMsg.textContent = "Verification error";
        verifyOtpBtn.disabled = false;
        verifyOtpBtn.textContent = "Verify Account";
      }
    });

  </script>

</body>
</html>
