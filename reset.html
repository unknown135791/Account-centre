<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      padding: 10px;
      width: 200px;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Reset Password</h2>

  <input type="password" id="password" placeholder="New password" />
  <br>
  <button onclick="resetPassword()">Update Password</button>

  <p id="msg"></p>
</div>

<script>
const BASE_URL = "https://accountcentre.onrender.com";
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

async function resetPassword() {
  const password = document.getElementById("password").value.trim();
  const msgEl = document.getElementById("msg");
  const btn = document.querySelector("button");

  if (!password) {
    msgEl.style.color = "red";
    msgEl.innerText = "Enter a password";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Updating...";
  msgEl.style.color = "black";
  msgEl.innerText = "";

  try {
    const res = await fetch(`${BASE_URL}/reset-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, password })
    });

    const data = await res.json();
    
    if (res.ok) {
      msgEl.style.color = "green";
      msgEl.innerText = "Password updated! Redirecting to login...";
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);
    } else {
      msgEl.style.color = "red";
      msgEl.innerText = data.msg || "Something went wrong.";
      btn.disabled = false;
      btn.innerText = "Update Password";
    }
  } catch (err) {
    msgEl.style.color = "red";
    msgEl.innerText = "Server error. Try again later.";
    btn.disabled = false;
    btn.innerText = "Update Password";
  }
}
</script>

</body>
</html>
