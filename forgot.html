<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      padding: 10px;
      width: 200px;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Forgot Password</h2>

  <input type="email" id="email" placeholder="Enter your email" />
  <br>
  <button onclick="sendReset()">Send Reset Link</button>

  <p id="msg"></p>
</div>

<script>
const BASE_URL = "https://accountcentre.onrender.com";

async function sendReset() {
  const email = document.getElementById("email").value.trim();
  const msgEl = document.getElementById("msg");
  const btn = document.querySelector("button");

  if (!email) {
    msgEl.style.color = "red";
    msgEl.innerText = "Enter your email";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Sending...";
  msgEl.style.color = "black";
  msgEl.innerText = "";

  try {
    const res = await fetch(`${BASE_URL}/forgot-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await res.json();
    
    if (res.ok) {
      msgEl.style.color = "green";
      msgEl.innerText = data.msg || "Check your email for the reset link!";
      btn.innerText = "Sent!";
    } else {
      msgEl.style.color = "red";
      msgEl.innerText = data.msg || "Something went wrong.";
      btn.disabled = false;
      btn.innerText = "Send Reset Link";
    }
  } catch (err) {
    msgEl.style.color = "red";
    msgEl.innerText = "Server error. Try again later.";
    btn.disabled = false;
    btn.innerText = "Send Reset Link";
  }
}
</script>

</body>
</html>
